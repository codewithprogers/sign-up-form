<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-Up Form Project</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="signup-page">
      <div class="left-col-image">
        <img src="images/pexels-nobleseed-32919789.jpg" alt="" />
      </div>

      <div class="right-col-form">
        <div class="right-content">
          <div class="top-content">
            <p class="promotion">Get 10% off of your next purchase.</p>
          </div>
          <div class="form-section">
            <h2 class="create-account">Create your account</h2>
            <form action="" class="signup-container">
              <div class="signup-wrapper">
                <fieldset class="form-card">
                  <legend>Account details</legend>
                  <div class="form-row">
                    <label for="first-name">First name</label>
                    <input
                      type="text"
                      id="first-name"
                      name="first-name"
                      placeholder=" "
                      required
                    />
                  </div>
                  <div class="form-row">
                    <label for="last-name">Last name</label>
                    <input
                      type="text"
                      id="last-name"
                      name="last-name"
                      placeholder=" "
                      required
                    />
                  </div>
                  <div class="form-row">
                    <label for="email">Email</label>
                    <input
                      type="email"
                      id="email"
                      name="email"
                      placeholder=" "
                      required
                    />
                  </div>
                  <div class="form-row">
                    <label for="number">Phone number</label>
                    <input type="tel" id="number" name="phone-number" />
                  </div>
                  <div class="form-row">
                    <label for="password">Password</label>
                    <input
                      type="password"
                      id="password"
                      name="password"
                      placeholder=" "
                      required
                    />
                  </div>
                  <div class="form-row">
                    <label for="confirm-pw">Confirm password</label>
                    <input
                      type="password"
                      id="confirm-pw"
                      name="confirm-password"
                      placeholder=" "
                      required
                    />
                  </div>
                </fieldset>
              </div>
              <div class="i-agree">
                <input type="checkbox" id="agree" name="i-agree" />
                <label for="agree">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</label>
              </div>
              <button>Create account</button>
              <div class="log-in">
                <p>Already have an account? <a href="#">Log in</a></p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
