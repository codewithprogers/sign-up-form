<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-Up Form Project</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="signup-page">
      <div class="left-col-image">
        <img src="images/h-co-gXbbZQfChCY-unsplash.jpg" alt="" />
      </div>

      <div class="right-col-form">
        <p class="promotion">
          Sign up now to get notified about our latest drops and get 10% off of
          you next purchase.
        </p>

        <form action="" class="signup-container">
          <h2 class="brand-name">Chrome Hearts</h2>

          <div class="form-card">
            <div class="signup-wrapper">
              <div class="form-row">
                <label for="first-name">FIRST NAME</label>
                <input type="text" id="first-name" name="first-name" required />
              </div>
              <div class="form-row">
                <label for="last-name">LAST NAME</label>
                <input type="text" id="last-name" name="last-name" />
              </div>
              <div class="form-row">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" />
              </div>
              <div class="form-row">
                <label for="number">PHONE NUMBER</label>
                <input type="tel" id="number" name="phone-number" />
              </div>
              <div class="form-row">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" required />
              </div>
              <div class="form-row">
                <label for="confirm-pw">CONFIRM PASSWORD</label>
                <input type="password" id="confirm-pw" name="confirm-password" required />
              </div>
            </div>
          </div>

          <button>Create Account</button>
        </form>
      </div>
    </div>
  </body>
</html>
